<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy (dev-compatible baseline).
      Phase 6 will tighten this for the production build:
        - remove 'unsafe-inline' from style-src (Vite injects styles inline only in dev),
        - drop ws:/wss: from connect-src (HMR only),
        - keep script-src 'self' with no 'unsafe-eval'.
      Invariant kept here: NO external origins, NO remote data egress, object/base/frame locked.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'"
    />
    <meta name="color-scheme" content="light dark" />

    <!-- PWA: installable to home screen (Android app drawer + iOS home screen). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b1416" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f3ecdd" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finance Guru" />

    <title>Finance Guru</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
